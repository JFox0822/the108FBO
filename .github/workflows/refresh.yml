name: Daily Fantrax Refresh

on:
  schedule:
    - cron: '0 13 * * *'  # 8am CST (UTC-5) = 1pm UTC
  workflow_dispatch:        # also lets you trigger manually from GitHub

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run fetch script
        env:
          FANTRAX_EMAIL: ${{ secrets.FANTRAX_EMAIL }}
          FANTRAX_PASSWORD: ${{ secrets.FANTRAX_PASSWORD }}
        run: python scripts/fetch_data.py

      - name: Commit and push data.json
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Daily data refresh $(date +'%Y-%m-%d')"
          git push
